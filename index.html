<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Simpli Piano</title>
  <meta name="description" content="Learn piano with guided, color-coded play-along lessons — installable on your iPad." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f1117" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Simpli Piano" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="stylesheet" href="static/css/style.css" />
</head>
<body>
  <header class="topbar">
    <button id="back-btn" class="back" aria-label="Back" hidden>‹</button>
    <div class="title">
      <span class="logo" aria-hidden="true"></span>
      <h1 id="view-title">Simpli&nbsp;Piano</h1>
    </div>
    <div id="topbar-actions" class="topbar-actions"></div>
  </header>

  <main id="view"></main>

  <!-- Modules load in dependency order; no build step. -->
  <script>
    // Share/Feedback config — Piano supplies its own buttons (no floating FAB).
    window.APP_INFO = {
      name: "Simpli Piano",
      url: "https://jconiker.github.io/simpli-piano/",
      email: "joeconiker@gmail.com",
      noFab: true,
    };
  </script>
  <script src="static/js/version.js"></script>
  <script src="static/js/feedback.js"></script>
  <script src="static/js/audio.js"></script>
  <script src="static/js/keyboard.js"></script>
  <script src="static/js/songs.js"></script>
  <script src="static/js/engine.js"></script>
  <script src="static/js/trainer.js"></script>
  <script src="static/js/course.js"></script>
  <script src="static/js/mic.js"></script>
  <script src="static/js/app.js"></script>
</body>
</html>
